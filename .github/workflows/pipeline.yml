name: CI/CD Pipeline
env:
  SOLUTION_NAME: 'TestCodeApps'
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build the app
        run: npm run build

      - name: Install Power Platform CLI via .NET
        shell: pwsh
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          pac

      - name: Verify power.config.json exists
        shell: pwsh
        run: |
          if (-Not (Test-Path "./power.config.json")) {
            Write-Error "power.config.json not found in $pwd"
            Get-ChildItem -Force
            exit 1
          }

      - name: Authenticate to Dataverse
        run: |
          pac auth create --url ${{ secrets.ENVIRONMENT_URL }} --applicationId ${{ secrets.CLIENT_ID }} --clientSecret ${{ secrets.CLIENT_SECRET }} --tenant ${{ secrets.TENANT_ID }}
          pac auth who

      - name: Publish App to Environment
        run: |
          pac code push --solutionName ${{ env.SOLUTION_NAME }}
      
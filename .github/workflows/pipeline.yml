name: CI/CD Pipeline
env:
  NAME: 'DEV'
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install Power Platform CLI via .NET
        shell: pwsh
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          pac

      - name: Authenticate to Dataverse
        run: |
          pac auth create --url ${{ secrets.ENVIRONMENT_URL }} --applicationId ${{ secrets.CLIENT_ID }} --clientSecret ${{ secrets.CLIENT_SECRET }} --tenant ${{ secrets.TENANT_ID }}
          pac auth who
      